version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: triage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: triage_user
      POSTGRES_PASSWORD: triage_password
      POSTGRES_DB: triage_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U triage_user' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triage-network

  redis:
    image: redis:7-alpine
    container_name: triage-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triage-network

volumes:
  postgres_data:
    driver: local

networks:
  triage-network:
