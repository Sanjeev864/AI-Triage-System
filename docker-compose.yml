version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ai_triage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_triage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_triage_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  ml-service:
    build:
      context: ./ml-service
    container_name: ai_triage_ml
    restart: unless-stopped
    environment:
      ML_HOST: 0.0.0.0
      ML_PORT: 8000
    ports:
      - "8000:8000"

volumes:
  postgres_data:
