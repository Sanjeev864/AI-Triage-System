version: '3.8'

services:
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_triage_ml
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - ML_PORT=8000
      - ML_HOST=0.0.0.0
      - LOG_LEVEL=info
    volumes:
      - ./models:/app/models
      - ./main.py:/app/main.py
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
